root = "~"
# Directories to skip during scan.
# Simple names (e.g. "Library") match any directory with that name.
# Paths with "/" (e.g. ".local/share/Steam") match by relative path from root.
# Hidden entries (dot-prefixed) only matter with --hidden, since hidden dirs
# are already skipped by default.
skip = [
    ".Trash",
    "Library",
    "Applications",
    ".local/share/Steam",
    ".rustup",
    ".cargo",
    ".nvm",
    ".volta",
    ".asdf",
    ".cocoapods",
    ".pub-cache",
    ".m2",
    ".docker",
    ".orbstack",
]

[[targets]]
name = "node_modules"
dirs = ["node_modules"]
indicator = "package.json"

[[targets]]
name = "Pods"
dirs = ["Pods"]
indicator = "Podfile"

[[targets]]
name = "Gradle cache"
dirs = [".gradle", "build"]
indicator = "build.gradle"

[[targets]]
name = "pnpm store"
dirs = [".pnpm-store"]

[[targets]]
name = "Yarn cache"
dirs = [".yarn/cache"]
indicator = ".yarnrc.yml"

[[targets]]
name = "Next.js build"
dirs = [".next"]
indicator = "next.config.js"

[[targets]]
name = "Nuxt build"
dirs = [".nuxt"]
indicator = "nuxt.config.ts"

[[targets]]
name = "Rust target"
dirs = ["target"]
indicator = "Cargo.toml"

[[targets]]
name = "dist"
dirs = ["dist"]
indicator = "package.json"

# --- Ports mode ---
[ports]
# Only show ports matching these ranges on startup (toggle with 'a' in TUI)
dev_filter_enabled = true
# Port ranges to show when dev filter is active (supports "PORT" and "START-END")
dev_filter = ["3000-3009", "4000-4009", "5173-5174", "8080-8090"]
